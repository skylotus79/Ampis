{% extends "base.html" %}
{% block title %}AI 분석{% endblock %}
{% block content %}
<div class="two-col">
<div>
<div class="card">
  <div class="card-title"><i class="fa-solid fa-robot" style="color:var(--blue)"></i> AI 프로젝트 분석 (Claude 연동)</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
    <button class="btn sm" onclick="quickAsk('최근 부동산 PF 시장 트렌드를 분석해줘')">부동산 PF 트렌드 ↗</button>
    <button class="btn sm" onclick="quickAsk('NPL 시장 현황과 주요 투자자를 분석해줘')">NPL 분석 ↗</button>
    <button class="btn sm" onclick="quickAsk('에너지 인프라 투자 최근 동향을 알려줘')">에너지 동향 ↗</button>
    <button class="btn sm" onclick="quickAsk('DB에 있는 프로젝트들의 공통된 특징을 분석해줘')">전체 분석 ↗</button>
  </div>
  <div id="ai-msgs" style="height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:7px;padding:10px;background:var(--bg3);margin-bottom:8px">
    <div style="color:var(--text3);font-size:12px;text-align:center;padding:20px 0">
      질문을 입력하거나 위 버튼을 눌러보세요.<br>DB에 수집된 프로젝트 데이터를 기반으로 분석합니다.
    </div>
  </div>
  <div style="display:flex;gap:6px">
    <input type="text" id="aiInput" style="flex:1" placeholder="프로젝트, 시장, 경쟁사에 대해 질문하세요..." onkeydown="if(event.key==='Enter')sendAI()">
    <button class="btn primary" onclick="sendAI()"><i class="fa-solid fa-paper-plane"></i></button>
  </div>
</div>
</div>

<div>
<div class="card">
  <div class="card-title"><i class="fa-solid fa-wand-magic-sparkles" style="color:var(--amber)"></i> 뉴스 → AI 구조화 추출</div>
  <div style="font-size:11px;color:var(--text2);margin-bottom:8px">뉴스 원문을 붙여넣으면 프로젝트 정보를 자동으로 추출합니다</div>
  <textarea id="newsRaw" style="width:100%;height:100px;font-size:12px;padding:9px;border:1px solid var(--border);border-radius:7px;background:var(--bg3);color:var(--text);resize:vertical" placeholder="뉴스 기사 원문을 붙여넣으세요..."></textarea>
  <button class="btn primary sm" style="margin-top:8px" onclick="extractNews()"><i class="fa-solid fa-wand-magic-sparkles"></i> AI 구조화 추출</button>
  <div id="extractResult" style="margin-top:12px"></div>
</div>
</div>
</div>
{% endblock %}

{% block scripts %}
<script>
// URL 파라미터로 자동 질문
const urlQ = new URLSearchParams(location.search).get('q');
if(urlQ){ document.getElementById('aiInput').value=urlQ; sendAI(); }

function appendMsg(text, role){
  const box = document.getElementById('ai-msgs');
  const div  = document.createElement('div');
  div.style.cssText = `margin-bottom:8px;padding:9px 12px;border-radius:7px;font-size:12px;line-height:1.65;`
    + (role==='user'
      ? 'background:var(--blue);color:#fff;margin-left:32px'
      : 'background:var(--bg2);border:1px solid var(--border);margin-right:32px');
  if(role==='ai') div.innerHTML=`<div style="font-size:10px;color:var(--text3);margin-bottom:3px"><i class="fa-solid fa-robot"></i> AMPIS AI</div>${text.replace(/\n/g,'<br>')}`;
  else div.textContent=text;
  box.appendChild(div); box.scrollTop=box.scrollHeight;
  return div;
}

function appendLoading(){
  const div=appendMsg('','ai');
  div.id='ai-loading';
  div.innerHTML=`<div style="font-size:10px;color:var(--text3);margin-bottom:3px"><i class="fa-solid fa-robot"></i> AMPIS AI</div><span class="spinner"></span> 분석 중...`;
  return div;
}

async function sendAI(){
  const input=document.getElementById('aiInput');
  const msg=input.value.trim(); if(!msg) return;
  input.value='';
  // 첫 질문 시 안내 제거
  const box=document.getElementById('ai-msgs');
  if(box.querySelector('div[style*="text-align:center"]')) box.innerHTML='';
  appendMsg(msg,'user');
  const ld=appendLoading();
  try{
    const r=await fetch('/api/ai-chat',{method:'POST',headers:{'Content-Type':'application/json','X-API-Token':AMPIS_TOKEN},body:JSON.stringify({message:msg})});
    const d=await r.json();
    ld.remove();
    appendMsg(d.ok ? d.text : ('오류: '+(d.error||'알 수 없는 오류')),'ai');
  }catch(e){ ld.remove(); appendMsg('네트워크 오류가 발생했습니다.','ai'); }
}
function quickAsk(q){ document.getElementById('aiInput').value=q; sendAI(); }

async function extractNews(){
  const text=document.getElementById('newsRaw').value.trim();
  if(!text){ showToast('뉴스 원문을 입력하세요.'); return; }
  const result=document.getElementById('extractResult');
  result.innerHTML='<div style="color:var(--text3);font-size:12px"><span class="spinner"></span> AI 추출 중...</div>';
  try{
    const r=await fetch('/api/ai-extract',{method:'POST',headers:{'Content-Type':'application/json','X-API-Token':AMPIS_TOKEN},body:JSON.stringify({text})});
    const d=await r.json();
    if(!d.ok){ result.innerHTML=`<div style="color:var(--red);font-size:12px">오류: ${d.error}</div>`; return; }
    const p=d.data;
    if(!p.is_project){ result.innerHTML='<div style="color:var(--text3);font-size:12px;padding:10px 0">투자 딜 관련 뉴스가 아닌 것으로 판단됩니다.</div>'; return; }
    result.innerHTML=`
      <div style="border:1px solid var(--border);border-radius:7px;padding:12px">
        <div style="font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px">
          ${p.name||'—'} ${typeBadge(p.type)} <span class="badge b-etc">${p.status||'검토'}</span>
        </div>
        ${[['총 규모',p.size],['금융 구조',p.structure],['참여 금액',p.amount],['FI',p.fi],['SI',p.si],['시공사',p.ci],['담보/신용',p.collateral],['Exit 전략',p.exit_plan],['특징',p.features]]
          .filter(([,v])=>v&&v!='null')
          .map(([k,v])=>`<div class="drow"><span class="dlbl">${k}</span><span class="dval">${v}</span></div>`).join('')}
      </div>`;
  }catch(e){ result.innerHTML=`<div style="color:var(--red);font-size:12px">오류: ${e.message}</div>`; }
}
</script>
{% endblock %}
